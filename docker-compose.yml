version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: instructor-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: instructors

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5


  app:
    build: .
    container_name: instructor-api

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/instructors

    ports:
      - "8000:8000"

volumes:
  postgres_data: